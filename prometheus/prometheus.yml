global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    project: juniauto

scrape_configs:
  - job_name: juniauto-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["engine:9091"]

  - job_name: questdb
    metrics_path: /metrics
    static_configs:
      - targets: ["questdb:9003"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
