# JuniAuto production configuration
# Every numeric constant here is anchored to PRINCIPLESLONG.md §-references.
# Do not tune without a spec reference or a shadow-monitor promotion event.

system:
  name: JuniAuto
  version: 0.1.0
  environment: production
  timezone: America/New_York

# --- Applied Model Parameters (§2.19) ---
model:
  target_cadence: end_of_day
  decision_time_et: "15:55"                # daily decision tick
  source_selection_mode: prediction_sign_regime_evidence
  retained_baseline_floor_bps: 200         # §2.22
  primary_role_signal_bps: 460             # §2.22
  secondary_role_signal_bps: 348           # §2.22
  friction_seed_primary: 0.30              # §2.23
  friction_seed_secondary: 0.30            # §2.23
  friction_seed_retained: 0.30             # §2.23
  exit_reserve: 1.00                       # §2.19
  effective_execution_horizon_minutes: 390 # §2.27 (1 trading day)
  rotation_funded_sells: true              # §2.19
  action_memory_enforcement: shadow_only   # §2.19
  automatic_surface_switching: false       # §2.19
  minimum_holding_period_days: 1           # §3.1 PDT
  max_day_trades_rolling_5d: 3             # §3.1 PDT
  minimum_hurdle_bps: 0                    # §2.19
  source_evidence_threshold_bps: 95        # §2.20
  source_evidence_decay: 1.0               # §2.20 (no exponential fading)

# --- Bayesian stack (§2.6-2.8) ---
bayesian:
  zq: 1.0                                  # §2.6 conservative-edge quantile
  rho: 1.0                                 # §2.7 group-utility skepticism
  rho_h_flat: 1.0                          # §2.8 horizon-flat first, differentiate later
  rho_h_ladder:                            # §2.8 optional horizon schedule
    "1d": 1.0
    "2-3d": 0.9
    "1wk": 0.8
    "2wk": 0.7
  ridge_lambda: 5                          # §2.42
  prior_strength_kappa: 20                 # §2.42

# --- Cost model (§2.9-2.18, §2.24) ---
costs:
  spread_bps_cap: 1000                     # §2.24 normalization
  volatility_bps_cap: 200                  # §2.24 base_side_cost
  sqrt_impact_coeff: 25                    # §2.12, §2.24 (Bouchaud, calibrated)
  liquidity:
    min_bps: 0.25
    slope: 25
    cap_bps: 120
    missing_volume_floor_bps: 35
  stale_quote:                             # §2.24 recalibrated to sessions
    band1_threshold_sessions: 0.5
    band1_cap_bps: 20
    band2_threshold_sessions: 1.0
    band2_cap_bps: 80
    band2_slope: 40
  gap_risk:
    slope: 1.75
    cap_bps: 25
  queue_delay:
    min_bps: 0.8
    slope_size: 12
    slope_session: 4.5
    cap_bps: 60
  cancel_replace:                          # §2.24 Alpaca PFOF
    api_budget_bps: 2
    lost_queue_priority_bps: 1
    cap_bps: 60
  action_memory:
    fallback_round_trip_bps: 60            # §2.24
    horizon_seconds: 23400                 # 390 * 60 (§2.24)
  adverse_selection_share:                 # §2.24 Barclay-Hendershott 2003
    regular: 0.35
    extended: 0.55
    closed: 0.90
  session_multiplier:
    regular: 1.0
    premarket: 1.5
    after_hours: 2.0
    overnight: 2.5
  slippage:
    per_fill_decay: 0.75                   # alpha_fill
    cold_start_decay: 0.90
    max_fills: 10
    cold_start_universe_fills: 20
    floor_bps: 0
    cap_bps: 50
  buy_exit_haircut: 0.65                   # §2.24 practitioner rule of thumb
  buy_exit_future_factor: 0.85             # §2.24 combined: 0.5525 * base_side
  operational:
    base_bps: 5
    cap_bps: 40

# --- Portfolio sizing (§2.29-2.30) ---
sizing:
  max_name_weight: 0.10                    # §2.29
  cash_floor: 0.05                         # §2.29
  aggregate_comfortable_weight: 0.20       # §2.30
  gamma_risk: 1.0                          # §2.1
  lambda_confirm: 0.05                     # §2.1

# --- Shadow monitor (§2.41) ---
shadow:
  prior_delta: 0.0
  prior_strength_kappa0: 7
  min_clean_rows: 30
  min_positive_share: 0.55
  required_consecutive_passes: 2           # k=2 peeking correction
  min_n_eff:                               # horizon-specific effective-N
    "1d": 30
    "2-3d": 45
    "1wk": 60
    "2wk": 80
  rho_label:                               # overlapping-label autocorrelation
    "1d": 0.00
    "2-3d": 0.30
    "1wk": 0.50
    "2wk": 0.70

# --- Freshness halflives, in trading days (§1.3) ---
freshness_halflife_days:
  fundamental: 20
  technical: 5
  event: 2
  liquidity: 1
  semantic: 3
  risk: 5

# --- Universe filter (§1.1) ---
universe:
  min_price: 5.0
  min_adv_shares: 500000
  min_market_cap: 500000000
  exchanges: [NYSE, NASDAQ]
  include_etfs: true

# --- Data feeds ---
alpaca:
  feed: iex                                # 15-min delayed
  bar_timeframes: ["1Day"]                 # sub-day excluded; see §2.4
  history_bars: 252                        # ~1 year of daily bars

yahoo:
  fundamentals_ttl_days: 20                # match §1.3 halflife

# --- Database ---
database:
  host: ${DB_HOST:-questdb}
  port: ${DB_PORT:-8812}
  user: ${DB_USER:-admin}
  password: ${DB_PASSWORD:-quest}
  name: ${DB_NAME:-qdb}

# --- Logging ---
logging:
  level: ${LOG_LEVEL:-INFO}
  format: json
  file: /app/logs/juniauto.log
  rotation: daily

# --- Metrics ---
metrics:
  enabled: true
  port: 9091
  interval_seconds: 60
