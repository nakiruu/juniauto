# QuestDB server config for JuniAuto
# Docs: https://questdb.io/docs/reference/configuration/

cairo.commit.lag=1000
cairo.max.uncommitted.rows=100000
cairo.o3.max.lag=300000
cairo.snapshot.instance.id=juniauto

# HTTP / web console
http.enabled=true
http.bind.to=0.0.0.0:9000

# Postgres wire
pg.enabled=true
pg.net.bind.to=0.0.0.0:8812
pg.user=admin
pg.password=quest

# InfluxDB line protocol TCP (fast ingest path)
line.tcp.enabled=true
line.tcp.net.bind.to=0.0.0.0:9009

# Metrics for Prometheus scraping
metrics.enabled=true

# Telemetry off (self-hosted)
telemetry.enabled=false
