apiVersion: 1

datasources:
  - name: QuestDB
    type: postgres
    access: proxy
    url: questdb:8812
    user: admin
    database: qdb
    isDefault: false
    editable: true
    secureJsonData:
      # Grafana provisioning supports $VAR / ${VAR} / $__env{VAR}. It does NOT
      # support bash-style defaults like ${VAR:-fallback} — that literal string
      # would be sent as the password. Docker-compose already provides the
      # default at the env-var layer, so plain $GRAFANA_QUESTDB_PW is safe.
      password: $GRAFANA_QUESTDB_PW
    jsonData:
      sslmode: disable
      postgresVersion: 1200
      timescaledb: false
      maxOpenConns: 4
      maxIdleConns: 2
      connMaxLifetime: 14400

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 30s
